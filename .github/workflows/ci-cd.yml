name: CI/CD

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Go Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download modules
        run: go mod download

      - name: Run unit tests
        run: go test ./...

  compose-validate:
    name: Validate Compose
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare local env file
        run: cp .env.template .env

      - name: Validate docker-compose
        run: docker compose -f project/docker-compose.yml config > /dev/null

  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs:
      - test
      - compose-validate
    timeout-minutes: 20
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'

    strategy:
      fail-fast: false
      matrix:
        include:
          - image: peer-ledger-gateway
            dockerfile: services/gateway/Dockerfile
          - image: peer-ledger-user-service
            dockerfile: services/user-service/Dockerfile
          - image: peer-ledger-fraud-service
            dockerfile: services/fraud-service/Dockerfile
          - image: peer-ledger-wallet-service
            dockerfile: services/wallet-service/Dockerfile
          - image: peer-ledger-transaction-service
            dockerfile: services/transaction-service/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
          tags: ${{ matrix.image }}:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
