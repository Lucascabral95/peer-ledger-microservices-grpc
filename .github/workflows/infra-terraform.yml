name: Terraform Infra

on:
  workflow_dispatch:
    inputs:
      stack:
        description: "Terraform stack to execute"
        required: true
        type: choice
        options:
          - bootstrap
          - foundation
          - platform
      action:
        description: "Terraform action"
        required: true
        type: choice
        options:
          - plan
          - apply
          - destroy

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
  TF_LOCK_TABLE: ${{ vars.TF_LOCK_TABLE }}
  FOUNDATION_STATE_KEY: ${{ vars.FOUNDATION_STATE_KEY || 'foundation/terraform.tfstate' }}
  TF_ENVIRONMENT: ${{ vars.TF_ENVIRONMENT || 'production' }}
  TF_IN_AUTOMATION: true

jobs:
  terraform:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: ${{ vars.DEPLOY_ENVIRONMENT || 'production' }}

    env:
      TF_VAR_aws_region: ${{ vars.AWS_REGION || 'us-east-1' }}
      TF_VAR_project_name: peer-ledger
      TF_VAR_environment: ${{ vars.TF_ENVIRONMENT || 'production' }}
      TF_VAR_state_bucket_name: ${{ vars.TF_STATE_BUCKET }}
      TF_VAR_lock_table_name: ${{ vars.TF_LOCK_TABLE }}
      TF_VAR_terraform_state_bucket_name: ${{ vars.TF_STATE_BUCKET }}
      TF_VAR_terraform_lock_table_name: ${{ vars.TF_LOCK_TABLE }}
      TF_VAR_foundation_state_key: ${{ vars.FOUNDATION_STATE_KEY || 'foundation/terraform.tfstate' }}
      TF_VAR_foundation_state_region: ${{ vars.AWS_REGION || 'us-east-1' }}
      TF_VAR_powershell_executable: pwsh
      TF_VAR_github_repository: ${{ github.repository }}
      TF_VAR_auth_jwt_secret: ${{ secrets.AUTH_JWT_SECRET }}
      TF_VAR_rds_master_username: ${{ secrets.RDS_MASTER_USERNAME }}
      TF_VAR_rds_master_password: ${{ secrets.RDS_MASTER_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}
          role-to-assume: ${{ vars.AWS_GITHUB_ACTIONS_ROLE_ARN }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Resolve stack directory
        id: stack
        shell: bash
        run: |
          echo "path=infra/${{ github.event.inputs.stack }}" >> "$GITHUB_OUTPUT"

      - name: Terraform init
        working-directory: ${{ steps.stack.outputs.path }}
        shell: bash
        run: |
          if [ "${{ github.event.inputs.stack }}" = "bootstrap" ]; then
            terraform init
          else
            terraform init \
              -backend-config="bucket=${TF_STATE_BUCKET}" \
              -backend-config="region=${AWS_REGION}" \
              -backend-config="dynamodb_table=${TF_LOCK_TABLE}" \
              -backend-config="key=${{ github.event.inputs.stack }}/terraform.tfstate"
          fi

      - name: Terraform validate
        working-directory: ${{ steps.stack.outputs.path }}
        run: terraform validate

      - name: Terraform plan
        if: github.event.inputs.action == 'plan'
        working-directory: ${{ steps.stack.outputs.path }}
        run: terraform plan -input=false

      - name: Terraform apply
        if: github.event.inputs.action == 'apply'
        working-directory: ${{ steps.stack.outputs.path }}
        run: terraform apply -auto-approve -input=false

      - name: Terraform destroy
        if: github.event.inputs.action == 'destroy'
        working-directory: ${{ steps.stack.outputs.path }}
        run: terraform destroy -auto-approve -input=false
