syntax = "proto3";

package transaction;

option go_package = "github.com/peer-ledger/gen/transaction;transaction";

service TransactionService {
  rpc Record     (RecordRequest)     returns (RecordResponse);
  rpc GetHistory (GetHistoryRequest) returns (GetHistoryResponse);
  rpc GetTransferSummary (GetTransferSummaryRequest) returns (GetTransferSummaryResponse);
  rpc ListTransfers (ListTransfersRequest) returns (ListTransfersResponse);
}

// --- Record ---
message RecordRequest {
  string sender_id       = 1;
  string receiver_id     = 2;
  double amount          = 3;
  string idempotency_key = 4;
  string transaction_id  = 5;
}

message RecordResponse {
  bool success = 1;
}

// --- GetHistory ---
message GetHistoryRequest {
  string user_id = 1;
}

message GetHistoryResponse {
  repeated TransactionRecord records = 1;
}

enum TransferDirection {
  TRANSFER_DIRECTION_ALL = 0;
  TRANSFER_DIRECTION_SENT = 1;
  TRANSFER_DIRECTION_RECEIVED = 2;
}

message GetTransferSummaryRequest {
  string user_id = 1;
  string timezone = 2;
}

message GetTransferSummaryResponse {
  string user_id = 1;
  double sent_total = 2;
  double received_total = 3;
  int64 sent_count_total = 4;
  int64 received_count_total = 5;
  int64 sent_count_today = 6;
  int64 received_count_today = 7;
  double sent_amount_today = 8;
  double received_amount_today = 9;
}

message ListTransfersRequest {
  string user_id = 1;
  TransferDirection direction = 2;
  string from_created_at = 3;
  string to_created_at = 4;
  int32 limit = 5;
}

message ListTransfersResponse {
  repeated TransactionRecord records = 1;
  bool has_more = 2;
}

message TransactionRecord {
  string transaction_id = 1;
  string sender_id      = 2;
  string receiver_id    = 3;
  double amount         = 4;
  string status         = 5;
  string created_at     = 6;
}
