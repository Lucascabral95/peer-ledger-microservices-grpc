name: Terraform Validate

on:
  push:
    paths:
      - "infra/**"
      - ".github/workflows/infra-terraform.yml"
  pull_request:
    paths:
      - "infra/**"
      - ".github/workflows/infra-terraform.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      TF_IN_AUTOMATION: true
      TERRAFORM_VERSION: 1.7.5
      TF_VAR_aws_region: us-east-1
      TF_VAR_project_name: peer-ledger
      TF_VAR_environment: production
      TF_VAR_state_bucket_name: peer-ledger-tfstate-ci
      TF_VAR_lock_table_name: peer-ledger-terraform-locks
      TF_VAR_terraform_state_bucket_name: peer-ledger-tfstate-ci
      TF_VAR_terraform_lock_table_name: peer-ledger-terraform-locks
      TF_VAR_foundation_state_key: foundation/terraform.tfstate
      TF_VAR_foundation_state_region: us-east-1
      TF_VAR_platform_state_key: platform/terraform.tfstate
      TF_VAR_state_region: us-east-1
      TF_VAR_auth_jwt_secret: ci-only-jwt-secret-at-least-32-characters
      TF_VAR_rds_master_username: peerledger
      TF_VAR_rds_master_password: CiOnlyPassword123!
      TF_VAR_service_images: '{"gateway":"example.com/peer-ledger-gateway:ci","user-service":"example.com/peer-ledger-user-service:ci","fraud-service":"example.com/peer-ledger-fraud-service:ci","wallet-service":"example.com/peer-ledger-wallet-service:ci","transaction-service":"example.com/peer-ledger-transaction-service:ci","db-migrator":"example.com/peer-ledger-db-migrator:ci"}'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Terraform
        shell: bash
        run: |
          set -euo pipefail

          curl --fail --silent --show-error --location \
            --retry 5 \
            --retry-all-errors \
            --retry-connrefused \
            --retry-delay 5 \
            --output /tmp/terraform.zip \
            "https://releases.hashicorp.com/terraform/${TERRAFORM_VERSION}/terraform_${TERRAFORM_VERSION}_linux_amd64.zip"

          unzip -o /tmp/terraform.zip -d /tmp/terraform-bin
          sudo install -m 0755 /tmp/terraform-bin/terraform /usr/local/bin/terraform
          terraform version

      - name: Terraform fmt
        run: terraform fmt -check -recursive infra

      - name: Terraform validate stacks
        shell: bash
        run: |
          set -euo pipefail

          for stack in bootstrap foundation platform services; do
            terraform -chdir="infra/${stack}" init -backend=false
            terraform -chdir="infra/${stack}" validate
          done
